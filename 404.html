<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interb Market Fx — Page Not Available</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }

    .glass {
      background: rgba(10, 10, 14, 0.64);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 18px 70px rgba(0,0,0,.62);
    }

    .chip {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .soft-border { border: 1px solid rgba(255,255,255,0.10); }

    .bg-broker {
      background:
        radial-gradient(1000px 420px at 20% 0%, rgba(56,189,248,0.18), transparent 60%),
        radial-gradient(900px 480px at 80% 10%, rgba(34,197,94,0.12), transparent 62%),
        radial-gradient(900px 520px at 55% 100%, rgba(168,85,247,0.14), transparent 62%),
        linear-gradient(180deg, #05060b 0%, #070813 45%, #05060b 100%);
      position: relative;
      overflow: hidden;
    }

    .bg-broker::before{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity:.16;
      pointer-events:none;
    }

    .ring-glow {
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06),
        0 18px 70px rgba(56,189,248,.10);
    }

    .btn-primary {
      background: linear-gradient(90deg, rgba(56,189,248,0.95), rgba(168,85,247,0.92));
    }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-primary:active { transform: scale(0.98); }
  </style>
</head>

<body class="min-h-screen bg-broker text-white">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="glass ring-glow rounded-3xl max-w-md w-full p-7 text-center">
      
      <!-- Icon -->
      <div class="mx-auto w-14 h-14 rounded-2xl chip grid place-items-center mb-4">
        <span class="text-2xl font-black">!</span>
      </div>

      <!-- Title -->
      <h1 class="text-2xl font-extrabold tracking-tight">
        Page Not Available
      </h1>

      <!-- Message -->
      <p class="mt-2 text-sm text-white/70 leading-relaxed">
        This page is currently under construction, unavailable, or the URL you entered is incorrect.
        Please check the link or return to the previous page.
      </p>

      <!-- Divider -->
      <div class="my-6 h-px bg-white/10"></div>

      <!-- Actions -->
      <div class="flex flex-col gap-3">
        <button
          onclick="goBack()"
          class="w-full rounded-2xl btn-primary font-extrabold py-3 transition"
        >
          ← Go Back
        </button>

        <a
          href="/"
          class="w-full rounded-2xl soft-border bg-white/5 hover:bg-white/10 font-extrabold py-3 transition"
        >
          Return to Home
        </a>
      </div>

      <!-- Footer -->
      <div class="mt-6 text-xs text-white/45">
        © <span id="yr"></span> Interb Market Fx • Secure Broker Platform
      </div>
    </div>
  </div>

  <script>
    document.getElementById("yr").textContent = new Date().getFullYear();

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "/";
      }
    }
  </script>
</body>
</html>
