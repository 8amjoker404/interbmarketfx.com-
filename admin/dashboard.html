<!-- /admin/dashboard.html ✅ Upcoinmeta Admin Dashboard (links hub) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Upcoinmeta — Admin Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../config/app-config.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    :root{
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    html, body{
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #05060b;
      overscroll-behavior: none;
    }

    .app-shell{
      height: 100vh;
      height: 100dvh;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      padding-top: calc(16px + var(--safe-top));
      padding-bottom: calc(16px + var(--safe-bottom));
    }

    .glass{
      background: rgba(10,10,14,.64);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 18px 70px rgba(0,0,0,.62);
    }
    .chip{ background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); }
    .soft-border{ border: 1px solid rgba(255,255,255,0.10); }
    .text-muted{ color: rgba(255,255,255,0.74); }
    .text-faint{ color: rgba(255,255,255,0.52); }

    .bg-broker{
      background:
        radial-gradient(1000px 420px at 20% 0%, rgba(56,189,248,0.18), transparent 60%),
        radial-gradient(900px 480px at 80% 10%, rgba(34,197,94,0.12), transparent 62%),
        radial-gradient(900px 520px at 55% 100%, rgba(168,85,247,0.14), transparent 62%),
        linear-gradient(180deg, #05060b 0%, #070813 45%, #05060b 100%);
      position: relative;
      overflow: hidden;
    }
    .bg-broker::before{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity:.16;
      pointer-events:none;
    }
    .bg-broker::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 12% 18%, rgba(56,189,248,.45) 0 2px, transparent 3px),
        radial-gradient(circle at 30% 30%, rgba(56,189,248,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 55% 18%, rgba(56,189,248,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 34%, rgba(56,189,248,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 64% 62%, rgba(56,189,248,.25) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 68%, rgba(56,189,248,.25) 0 2px, transparent 3px);
      opacity:.55;
      pointer-events:none;
      mix-blend-mode: screen;
    }
    .ring-glow{ box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 18px 70px rgba(56,189,248,.10); }

    .badge-admin{
      background: rgba(245,158,11,0.10);
      border: 1px solid rgba(245,158,11,0.24);
      color: rgba(253,230,138,0.95);
    }

    .btn-primary{ background: linear-gradient(90deg, rgba(56,189,248,0.95), rgba(168,85,247,0.92)); }
    .btn-primary:hover{ filter: brightness(1.05); }
    .btn-primary:active{ transform: scale(0.99); }

    .btn-ghost{
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .btn-ghost:hover{ background: rgba(255,255,255,0.08); }
    .btn-ghost:active{ transform: scale(0.99); }

    .card{
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
    }
    .card:hover{
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    /* iOS zoom prevention */
    @media (max-width: 420px){
      a, button, input { font-size: 16px; }
    }
  </style>
</head>

<body class="bg-broker text-white">
  <div class="app-shell">
    <div class="mx-auto max-w-[1100px] px-4">
      <div class="w-full glass ring-glow rounded-3xl p-5 sm:p-7">
        <!-- Top bar -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-2xl chip grid place-items-center shrink-0">
              <span class="text-lg font-black">U</span>
            </div>
            <div>
              <div class="text-xl font-extrabold leading-tight">Upcoinmeta</div>
              <div class="text-sm text-faint -mt-0.5">Admin Dashboard • Control Center</div>
            </div>
          </div>

          <div class="flex items-center gap-2 flex-wrap">
            <span class="badge-admin rounded-xl px-3 py-1 text-xs font-extrabold">ADMIN</span>
            <div class="chip rounded-xl px-3 py-1 text-xs font-extrabold" id="adminNameChip">Admin</div>

            <button id="logoutBtn" class="rounded-2xl btn-ghost px-4 py-3 font-extrabold">
              Logout
            </button>
          </div>
        </div>

        <!-- Alert -->
        <div id="alert" class="hidden mt-5 rounded-2xl px-4 py-3 text-sm soft-border"></div>

        <!-- Quick stats (placeholder) -->
        <div class="mt-5 grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="rounded-3xl p-4 card">
            <div class="text-xs text-white/55 font-semibold">Session</div>
            <div class="text-lg font-extrabold" id="sessionText">Checking…</div>
            <div class="text-xs text-white/45 mt-1">Admin token required</div>
          </div>
          <div class="rounded-3xl p-4 card">
            <div class="text-xs text-white/55 font-semibold">Access</div>
            <div class="text-lg font-extrabold">Full Control</div>
            <div class="text-xs text-white/45 mt-1">Users • Wallets • Funds • Plans</div>
          </div>
          <div class="rounded-3xl p-4 card">
            <div class="text-xs text-white/55 font-semibold">Security</div>
            <div class="text-lg font-extrabold">Protected</div>
            <div class="text-xs text-white/45 mt-1">ADMIN_REGISTER_SECRET enabled</div>
          </div>
        </div>

        <!-- Modules -->
        <div class="mt-6 flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div class="text-lg font-extrabold">Admin Modules</div>
            <div class="text-sm text-white/60">Choose a section to manage the platform</div>
          </div>

          <div class="flex items-center gap-2">
            <input id="search" type="text" placeholder="Search modules…"
              class="rounded-2xl input px-4 py-3 w-[220px] sm:w-[280px]" />
          </div>
        </div>

        <div id="grid" class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- cards injected by JS -->
        </div>

        <!-- Footer -->
        <div class="mt-7 text-center text-xs text-white/45">
          © <span id="yr"></span> Upcoinmeta • Admin Console
        </div>
      </div>
    </div>
  </div>

  <script>
    // ✅ API base (for future admin API calls)
    const ADMIN_API_BASE = (window.APP_CONFIG?.ADMIN_API_BASE || "https://api.upcoinmeta.middlesvilletrusted.com/api/admin");

    // ✅ Auth storage
    const TOKEN_KEY = "upcoinmeta_admin_token";
    const ADMIN_KEY = "upcoinmeta_admin";

    // ✅ Page links (create these pages next)
    const LINKS = [
      { id: "users",        title: "User Management",              desc: "View users, verify, hold, ban, update profiles.",           href: "./user-management.html", icon: "👤" },
      { id: "wallets",      title: "Wallet Addresses Management",  desc: "Manage deposit/withdrawal wallet addresses and networks.",    href: "./wallet-addresses.html", icon: "💼" },
      { id: "deposits",     title: "Deposits Management",          desc: "Review deposits, approve/reject, update status & notes.",     href: "./deposits.html", icon: "⬇️" },
      { id: "withdrawals",  title: "Withdrawals Management",       desc: "Review requests, confirm payouts, protect with OTP flow.",     href: "./withdrawals.html", icon: "⬆️" },
      { id: "plans",        title: "Plans Management",             desc: "Create and manage investment plans, ROI, durations, limits.",  href: "./plans.html", icon: "🧾" },
      { id: "copytraders",  title: "Copy Trader Management",       desc: "Create/edit trader profiles, performance, terms, visibility.", href: "./copy-traders.html", icon: "📈" },
      { id: "notify",       title: "Send Notifications",           desc: "Broadcast announcements to users (email/in-app records).",     href: "./notifications.html", icon: "📣" },
      { id: "upgrades",     title: "Approve Account Upgrades",     desc: "Review upgrade requests and approve plan/account tier changes.", href: "./account-upgrades.html", icon: "✅" },
    ];

    const alertBox = document.getElementById("alert");
    const grid = document.getElementById("grid");
    const search = document.getElementById("search");
    const logoutBtn = document.getElementById("logoutBtn");
    const sessionText = document.getElementById("sessionText");
    const adminNameChip = document.getElementById("adminNameChip");

    document.getElementById("yr").textContent = new Date().getFullYear();

    function showAlert(type, msg) {
      alertBox.classList.remove("hidden");
      alertBox.textContent = msg;

      alertBox.classList.remove("bg-red-500/10", "border-red-400/20", "text-red-200");
      alertBox.classList.remove("bg-emerald-500/10", "border-emerald-400/20", "text-emerald-200");
      alertBox.classList.remove("bg-amber-500/10", "border-amber-400/20", "text-amber-200");

      if (type === "success") {
        alertBox.classList.add("bg-emerald-500/10", "border", "border-emerald-400/20", "text-emerald-200");
      } else if (type === "warn") {
        alertBox.classList.add("bg-amber-500/10", "border", "border-amber-400/20", "text-amber-200");
      } else {
        alertBox.classList.add("bg-red-500/10", "border", "border-red-400/20", "text-red-200");
      }
    }

    function escapeHtml(s){
      return String(s || "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || "";
    }

    function getAdminName() {
      try {
        const a = JSON.parse(localStorage.getItem(ADMIN_KEY) || "{}");
        return a?.name || "Admin";
      } catch {
        return "Admin";
      }
    }

    function requireAuthOrRedirect() {
      const tok = getToken();
      if (!tok) {
        // no token -> back to admin login
        window.location.href = "./index.html";
        return false;
      }
      return true;
    }

    function renderCards(list) {
      grid.innerHTML = "";

      list.forEach(item => {
        const a = document.createElement("a");
        a.href = item.href;
        a.className = "rounded-3xl p-5 card transition transform hover:-translate-y-0.5";
        a.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div class="w-11 h-11 rounded-2xl chip grid place-items-center text-lg">${escapeHtml(item.icon)}</div>
            <div class="chip rounded-xl px-3 py-1 text-xs font-extrabold">OPEN</div>
          </div>
          <div class="mt-4 text-lg font-extrabold">${escapeHtml(item.title)}</div>
          <div class="mt-1 text-sm text-white/60 leading-relaxed">${escapeHtml(item.desc)}</div>
          <div class="mt-4 text-xs text-white/45 font-semibold break-all">${escapeHtml(item.href)}</div>
        `;
        grid.appendChild(a);
      });

      if (!list.length) {
        grid.innerHTML = `
          <div class="rounded-3xl p-6 card text-white/70">
            No modules match your search.
          </div>
        `;
      }
    }

    // Init
    if (requireAuthOrRedirect()) {
      const name = getAdminName();
      adminNameChip.textContent = name;
      sessionText.textContent = "Authenticated";
      renderCards(LINKS);
    }

    // Search filter
    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      if (!q) return renderCards(LINKS);

      const filtered = LINKS.filter(x =>
        (x.title || "").toLowerCase().includes(q) ||
        (x.desc || "").toLowerCase().includes(q) ||
        (x.id || "").toLowerCase().includes(q)
      );
      renderCards(filtered);
    });

    // Logout
    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(ADMIN_KEY);
      showAlert("success", "Logged out. Redirecting…");
      setTimeout(() => {
        window.location.href = "./index.html";
      }, 500);
    });
  </script>
</body>
</html>
