<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Up Coin Meta — Admin/Silent Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../config/app-config.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    .glass {
      background: rgba(10, 10, 14, 0.64);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 18px 70px rgba(0,0,0,.62);
    }
    .chip { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); }
    .soft-border { border: 1px solid rgba(255,255,255,0.10); }
    .text-muted { color: rgba(255,255,255,0.74); }
    .text-faint { color: rgba(255,255,255,0.52); }

    .bg-broker {
      background:
        radial-gradient(1000px 420px at 20% 0%, rgba(56,189,248,0.18), transparent 60%),
        radial-gradient(900px 480px at 80% 10%, rgba(34,197,94,0.12), transparent 62%),
        radial-gradient(900px 520px at 55% 100%, rgba(168,85,247,0.14), transparent 62%),
        linear-gradient(180deg, #05060b 0%, #070813 45%, #05060b 100%);
      position: relative;
      overflow: hidden;
    }
    .bg-broker::before{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity:.16;
      pointer-events:none;
    }
    .bg-broker::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 12% 18%, rgba(56,189,248,.45) 0 2px, transparent 3px),
        radial-gradient(circle at 30% 30%, rgba(56,189,248,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 55% 18%, rgba(56,189,248,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 34%, rgba(56,189,248,.35) 0 2px, transparent 3px),
        radial-gradient(circle at 64% 62%, rgba(56,189,248,.25) 0 2px, transparent 3px),
        radial-gradient(circle at 18% 68%, rgba(56,189,248,.25) 0 2px, transparent 3px);
      opacity:.55;
      pointer-events:none;
      mix-blend-mode: screen;
    }
    .ring-glow { box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 18px 70px rgba(56,189,248,.10); }

    .badge-silent {
      background: rgba(168,85,247,0.10);
      border: 1px solid rgba(168,85,247,0.22);
      color: rgba(216,180,254,0.95);
    }

    .btn-primary {
      background: linear-gradient(90deg, rgba(56,189,248,0.95), rgba(168,85,247,0.92));
    }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-primary:active { transform: scale(0.99); }

    .input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      outline: none;
    }
    .input:focus { box-shadow: 0 0 0 3px rgba(56,189,248,0.22); border-color: rgba(56,189,248,0.28); }
  </style>
</head>

<body class="min-h-screen bg-broker text-white">
  <div class="mx-auto max-w-[420px] min-h-screen px-4 py-7 flex items-center">
    <div class="w-full glass ring-glow rounded-3xl p-6">
      <!-- Header -->
      <div class="flex items-start justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="w-11 h-11 rounded-2xl chip grid place-items-center">
            <span class="text-lg font-black">U</span>
          </div>
          <div>
            <div class="text-xl font-extrabold leading-tight">Up Coin Meta</div>
            <div class="text-sm text-faint -mt-0.5">Silent login • No email notice</div>
          </div>
        </div>

        <span class="badge-silent rounded-xl px-3 py-1 text-xs font-extrabold">
          LOGIN-NO-EMAIL
        </span>
      </div>

      <!-- Alert -->
      <div id="alert" class="hidden mt-5 rounded-2xl px-4 py-3 text-sm soft-border"></div>

      <!-- Form -->
      <form id="loginForm" class="mt-5 space-y-4">
        <div>
          <label class="text-sm font-semibold text-muted">Email or Username</label>
          <div class="mt-2 relative">
            <input
              id="identifier"
              type="text"
              autocomplete="username"
              placeholder="e.g. playstation44 or trader@email.com"
              class="w-full rounded-2xl input px-4 py-3"
              required
            />
          </div>
        </div>

        <div>
          <label class="text-sm font-semibold text-muted">Password</label>
          <div class="mt-2 relative">
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              class="w-full rounded-2xl input px-4 py-3 pr-12"
              required
            />
            <button
              type="button"
              id="togglePass"
              class="absolute right-2 top-1/2 -translate-y-1/2 chip rounded-xl px-3 py-2 text-xs font-extrabold"
              aria-label="Toggle password visibility"
            >
              SHOW
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-2 text-sm text-white/70 cursor-pointer select-none">
            <input id="remember" type="checkbox" class="accent-sky-400 w-4 h-4" />
            Remember me
          </label>

          <a href="../auth/forgot.html" class="text-sm font-semibold text-sky-300 hover:text-sky-200">
            Forgot password?
          </a>
        </div>

        <button
          id="loginBtn"
          type="submit"
          class="w-full rounded-2xl btn-primary transition font-extrabold py-3"
        >
          Login (No Email Notice)
        </button>

        <p class="text-[12px] text-white/55 leading-relaxed">
          Verified accounts only. If not verified, you’ll be redirected to OTP verification.
        </p>
      </form>

      <!-- Footer -->
      <div class="mt-6 text-center text-xs text-white/45">
        © <span id="yr"></span> Up Coin Meta • Broker & Investment Services
      </div>
    </div>
  </div>

  <script>
    // ✅ API base (same as your example)
    const API_BASE = (window.APP_CONFIG?.USERS_API_BASE || "https://api.upcoinmeta.middlesvilletrusted.com/api/users");

    // ✅ storage keys (same)
    const TOKEN_KEY = "upcoinmeta_token";
    const USER_KEY  = "upcoinmeta_user";

    const alertBox = document.getElementById("alert");
    const loginForm = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const togglePass = document.getElementById("togglePass");

    document.getElementById("yr").textContent = new Date().getFullYear();

    function showAlert(type, msg) {
      alertBox.classList.remove("hidden");
      alertBox.textContent = msg;

      alertBox.classList.remove("bg-red-500/10", "border-red-400/20", "text-red-200");
      alertBox.classList.remove("bg-emerald-500/10", "border-emerald-400/20", "text-emerald-200");
      alertBox.classList.remove("bg-amber-500/10", "border-amber-400/20", "text-amber-200");

      if (type === "success") {
        alertBox.classList.add("bg-emerald-500/10", "border", "border-emerald-400/20", "text-emerald-200");
      } else if (type === "warn") {
        alertBox.classList.add("bg-amber-500/10", "border", "border-amber-400/20", "text-amber-200");
      } else {
        alertBox.classList.add("bg-red-500/10", "border", "border-red-400/20", "text-red-200");
      }
    }

    function setLoading(isLoading) {
      if (isLoading) {
        loginBtn.disabled = true;
        loginBtn.textContent = "Verifying credentials...";
        loginBtn.classList.add("opacity-70");
      } else {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login (No Email Notice)";
        loginBtn.classList.remove("opacity-70");
      }
    }

    // Toggle password
    togglePass.addEventListener("click", () => {
      const pass = document.getElementById("password");
      const isHidden = pass.type === "password";
      pass.type = isHidden ? "text" : "password";
      togglePass.textContent = isHidden ? "HIDE" : "SHOW";
    });

    // Submit
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const identifier = document.getElementById("identifier").value.trim();
      const password = document.getElementById("password").value;

      if (!identifier || !password) {
        return showAlert("error", "Please enter your email/username and password.");
      }

      setLoading(true);
      alertBox.classList.add("hidden");

      try {
        // ✅ IMPORTANT: call /login-no-email
        const res = await axios.post(`${API_BASE}/login-no-email`, { identifier, password }, {
          headers: { "Content-Type": "application/json" },
          timeout: 20000,
        });

        const data = res.data || {};
        if (!data.token) {
          setLoading(false);
          return showAlert("error", "Login failed: token missing from server response.");
        }

        // remember behavior
        const remember = document.getElementById("remember").checked;
        const storage = remember ? localStorage : sessionStorage;

        storage.setItem(TOKEN_KEY, data.token);
        storage.setItem(USER_KEY, JSON.stringify(data.user || {}));

        showAlert("success", "Login successful! Redirecting...");

        setTimeout(() => {
          window.location.href = "../pages/dashboard.html";
        }, 900);
      } catch (err) {
        const status = err?.response?.status;
        const msg = err?.response?.data?.message || "Login failed. Please try again.";

        if (status === 403) {
          showAlert("warn", msg + " Redirecting to OTP verification...");
          setTimeout(() => window.location.href = "../auth/verify.html", 1200);
        } else if (status === 401) {
          showAlert("error", "Invalid email/username or password.");
        } else {
          showAlert("error", msg);
        }
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
